<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Calistoga&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script src="{{ url_for('static', filename='script.js') }}" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">AI</div>
          <div>
            <h1>AI <span>Search</span></h1>
            <p>Live web reasoning</p>
          </div>
        </div>
        <div class="status-pill">
          <span class="status-dot"></span>
          <span>Live</span>
        </div>
      </header>

      <main class="chat-shell">
        <section id="messages" class="messages" aria-live="polite" aria-label="Chat messages"></section>

        <form id="composer" class="composer">
          <label class="input-shell" for="messageInput">
            <input
              id="messageInput"
              name="message"
              type="text"
              placeholder="Ask anything…"
              autocomplete="off"
              spellcheck="true"
              required
            />
          </label>
          <button class="send-btn" type="submit">
            <span>Send</span>
            <span class="arrow" aria-hidden="true">→</span>
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
